# yaml-language-server: $schema=none
name: cert-prep
version: 0.6.1
license: MIT
license-file: LICENSE
author: Paul Grillenberger
maintainer: grillenbergerpaul@gmail.com

language: GHC2021
default-extensions:
  - OverloadedStrings

dependencies:
  - name: base
    version: "< 5"
    mixin:
      - hiding (Prelude)
  - name: relude
    mixin:
      - (Relude as Prelude)
      - ""
  - text
  - containers
  - random >= 1.3

library:
  source-dirs: src
  ghc-options:
    - -Wall
    - -O2
  dependencies:
    - aeson
    - directory
    - filepath
    - time

internal-libraries:
  cert-prep-tui:
    source-dirs: app
    ghc-options:
      - -Wall
      - -O2
    dependencies:
      - cert-prep
      - brick
      - microlens
      - microlens-mtl
      - microlens-th
      - mtl
      - openai
      - optparse-applicative
      - time
      - vector
      - vty
      - vty-crossplatform

executables:
  cert-prep:
    main: Main.hs
    source-dirs: exe
    ghc-options:
      - -Wall
      - -O2
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    dependencies:
      - cert-prep
      - cert-prep-tui
      - aeson
      - brick
      - directory
      - vty
      - vty-crossplatform

tests:
  spec:
    main: Spec.hs
    source-dirs: test
    ghc-options:
      - -Wall
    build-tools:
      - hspec-discover
    dependencies:
      - cert-prep
      - cert-prep-tui
      - aeson
      - directory
      - hspec
      - QuickCheck
      - temporary
      - time
      - microlens
      - vector

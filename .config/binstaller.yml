# yaml-language-server: $schema=https://raw.githubusercontent.com/binary-install/binstaller/main/schema/InstallSpec.json
schema: v1
repo: wavefrontset/cert-prep
asset:
  template: cert-prep-${OS}-${ARCH}${EXT}
  default_extension: .tar.gz
  rules:
    - when:
        arch: amd64
      arch: x86_64
    - when:
        os: darwin
      os: macos
    - when:
        os: darwin
        arch: amd64
      arch: amd64
    - when:
        os: darwin
        arch: arm64
      arch: aarch64
    - when:
        os: windows
      ext: .zip
      binaries:
        - name: cert-prep
          path: cert-prep.exe
